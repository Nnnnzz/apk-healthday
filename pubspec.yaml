name: healthday_application
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  table_calendar: ^3.1.2
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.2
  pedometer: ^3.0.0  # สำหรับอ่านค่าเซ็นเซอร์นับก้าว
  permission_handler: ^11.0.1 # สำหรับขออนุญาตผู้ใช้เข้าถึงข้อมูลสุขภาพ
  shared_preferences: ^2.2.2   # ตัวช่วยจำ "ก้าวเริ่มต้นของวัน" 
  flutter_local_notifications: ^17.1.1
  timezone: ^0.9.2
  image_picker: ^1.0.7
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700