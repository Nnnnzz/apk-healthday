name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # อัปเดตจาก v3 เป็น v4

      - uses: actions/setup-java@v4 # อัปเดตจาก v3 เป็น v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4 # สำคัญมาก! ต้องเป็น v4 เท่านั้น
        with:
          name: healthday-apk
          path: build/app/outputs/flutter-apk/app-release.apk